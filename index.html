<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oral Assessment Tool — B1+</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #141414;
    --paper: #f5f2ed;
    --card: #ffffff;
    --green: #457466;
    --green-dark: #2e5249;
    --green-pale: #eaf2ef;
    --green-mid: #c2dbd5;
    --rule: #e0dbd3;
    --muted: #7a7570;
    --weak: #c0392b;
    --weak-bg: #fdf0ef;
    --ok: #d4860a;
    --ok-bg: #fef8ec;
    --good: #2980b9;
    --good-bg: #eaf4fb;
    --excellent: #27ae60;
    --excellent-bg: #eafaf1;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: white;
    padding: 1.8rem 2.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span {
    color: #9be0cc;
  }
  .header-meta {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── LAYOUT ── */
  .wrapper {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── STUDENT BAR ── */
  .student-bar {
    background: white;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 1.1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .student-bar label {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    white-space: nowrap;
  }
  .student-bar input {
    flex: 1;
    min-width: 160px;
    border: none;
    border-bottom: 2px solid var(--rule);
    background: transparent;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    padding: 0.25rem 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .student-bar input:focus { border-color: var(--green); }
  .student-bar input::placeholder { color: #ccc; font-weight: 400; }

  .date-field {
    font-size: 0.82rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule);
  }

  /* ── CRITERION CARD ── */
  .criterion-card {
    background: var(--card);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 1.3rem 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .criterion-card:focus-within {
    border-color: var(--green-mid);
    box-shadow: 0 4px 16px rgba(69,116,102,0.08);
  }

  .crit-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .crit-info { flex: 1; min-width: 180px; }
  .crit-number {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--green);
    margin-bottom: 0.2rem;
  }
  .crit-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.15rem;
  }
  .crit-hint {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.45;
  }

  /* ── LEVEL BUTTONS ── */
  .level-btns {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .level-btn {
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 0.35rem 0.75rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--paper);
    color: var(--muted);
    border-color: var(--rule);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .level-btn:hover { transform: translateY(-1px); }

  .level-btn[data-level="weak"].active   { background: var(--weak-bg);      color: var(--weak);      border-color: var(--weak); }
  .level-btn[data-level="ok"].active     { background: var(--ok-bg);        color: var(--ok);        border-color: var(--ok); }
  .level-btn[data-level="good"].active   { background: var(--good-bg);      color: var(--good);      border-color: var(--good); }
  .level-btn[data-level="excellent"].active { background: var(--excellent-bg); color: var(--excellent); border-color: var(--excellent); }

  /* ── NOTES TEXTAREA ── */
  .crit-notes {
    width: 100%;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: var(--paper);
    resize: vertical;
    min-height: 64px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.55;
  }
  .crit-notes:focus { border-color: var(--green); background: white; }
  .crit-notes::placeholder { color: #bbb; }

  /* ── OVERALL SECTION ── */
  .overall-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 580px) { .overall-grid { grid-template-columns: 1fr; } }

  .overall-box {
    background: var(--card);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 1.2rem 1.3rem;
    transition: border-color 0.2s;
  }
  .overall-box:focus-within { border-color: var(--green-mid); }
  .overall-box label {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 0.6rem;
  }
  .overall-box.went-well label { color: var(--excellent); }
  .overall-box.improve label   { color: var(--ok); }

  .overall-box textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    resize: vertical;
    min-height: 90px;
    outline: none;
    line-height: 1.6;
  }
  .overall-box textarea::placeholder { color: #ccc; }

  /* ── GENERATE BUTTON ── */
  .generate-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 1.5rem;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.75rem 1.8rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--ink);
    color: white;
  }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
  .btn-reset {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--rule);
  }
  .btn-reset:hover { border-color: var(--ink); color: var(--ink); }

  /* ── FEEDBACK PANEL ── */
  #feedback-panel {
    display: none;
    background: var(--ink);
    color: white;
    border-radius: var(--radius);
    padding: 2rem 2rem 1.5rem;
    margin-top: 2.5rem;
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

  .fb-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .fb-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
  }
  .fb-header h2 span { color: #9be0cc; }
  .fb-student-name {
    font-size: 0.8rem;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .fb-scores {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }
  .fb-score-chip {
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    font-size: 0.8rem;
  }
  .fb-score-chip .chip-crit {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.65;
    margin-bottom: 0.2rem;
  }
  .fb-score-chip .chip-level {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .chip-weak      { background: rgba(192,57,43,0.25);  }
  .chip-ok        { background: rgba(212,134,10,0.25); }
  .chip-good      { background: rgba(41,128,185,0.25); }
  .chip-excellent { background: rgba(39,174,96,0.25);  }
  .chip-none      { background: rgba(255,255,255,0.07); }

  .fb-section {
    margin-bottom: 1.2rem;
  }
  .fb-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.45;
    margin-bottom: 0.6rem;
  }
  .fb-notes-list { list-style: none; padding: 0; }
  .fb-notes-list li {
    display: flex;
    gap: 0.7rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .fb-notes-list li:last-child { border-bottom: none; }
  .fb-notes-list li .note-crit {
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    min-width: 90px;
    padding-top: 2px;
  }
  .fb-overall {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 0.5rem;
  }
  @media (max-width: 500px) { .fb-overall { grid-template-columns: 1fr; } }
  .fb-overall-box {
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .fb-overall-box .fb-overall-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 0.5rem;
  }
  .fb-overall-box.went { color: #9be0cc; }
  .fb-overall-box.improve { color: #f5c97a; }
  .fb-overall-box p { font-size: 0.88rem; line-height: 1.6; opacity: 0.85; color: white; }

  .fb-print-btn {
    margin-top: 1.5rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.7rem;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.15);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.6rem 1.4rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); }

  @media print {
    header, .student-bar, .generate-row, .btn-reset, .fb-print-btn { display: none !important; }
    #feedback-panel { display: block !important; background: white !important; color: black !important; border: 1px solid #ccc; }
    .fb-score-chip, .fb-overall-box { border: 1px solid #ddd !important; }
  }
</style>
</head>
<body>

<header>
  <h1>Oral Assessment <span>B1+</span></h1>
  <div class="header-meta">Business English · Gen Z Marketing</div>
</header>

<div class="wrapper">

  <!-- API Key + Student name + date -->
  <div class="student-bar">
    <label>🔑 API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-…" style="min-width:200px;font-size:0.85rem;font-family:monospace;" autocomplete="off">
    <div style="width:1px;height:24px;background:var(--rule);flex-shrink:0"></div>
    <label>Student</label>
    <input type="text" id="student-name" placeholder="Enter student name…" autocomplete="off">
    <div class="date-field" id="today-date"></div>
  </div>

  <!-- Criteria -->
  <div class="section-label">Assessment Criteria</div>
  <div id="criteria-container"></div>

  <!-- What went well / Could improve -->
  <div class="section-label" style="margin-top:1.8rem;">Overall Impression</div>
  <div class="overall-grid">
    <div class="overall-box went-well">
      <label>✓ What went well</label>
      <textarea id="went-well" placeholder="Strengths, strong moments, good use of language…"></textarea>
    </div>
    <div class="overall-box improve">
      <label>△ What could be improved</label>
      <textarea id="could-improve" placeholder="Areas to work on, recurring errors, suggestions…"></textarea>
    </div>
  </div>

  <div class="generate-row">
    <button class="btn btn-reset" onclick="resetForm()">↺ Reset</button>
    <button class="btn btn-primary" onclick="generateFeedback()">Generate Feedback →</button>
  </div>

  <!-- Feedback panel -->
  <div id="feedback-panel"></div>

</div>

<script>
const criteria = [
  {
    id: "grammar",
    title: "Grammar",
    hint: "Accuracy of tenses, sentence structure, modal verbs, conditionals, agreement."
  },
  {
    id: "vocabulary",
    title: "Vocabulary",
    hint: "Range and appropriacy of vocabulary; use of topic-specific and B1+ level words."
  },
  {
    id: "content",
    title: "Content",
    hint: "Relevance, depth, and quality of ideas presented. Does the student address the task?"
  },
  {
    id: "structure",
    title: "Structure & Coherence",
    hint: "Logical flow, use of linking words, clear introduction and conclusion."
  },
  {
    id: "fluency",
    title: "Fluency",
    hint: "Smoothness of delivery, natural pace, ability to self-correct without losing flow."
  },
  {
    id: "pronunciation",
    title: "Pronunciation",
    hint: "Clarity of sounds, word stress, sentence rhythm and intonation."
  },
  {
    id: "interaction",
    title: "Interaction & Communication",
    hint: "Ability to engage, respond to questions, maintain conversation, use communication strategies."
  }
];

const levels = ["Weak", "OK", "Good", "Excellent"];
const levelKeys = ["weak", "ok", "good", "excellent"];

// Store ratings
const ratings = {};
criteria.forEach(c => ratings[c.id] = null);

function buildCriteria() {
  const container = document.getElementById('criteria-container');
  criteria.forEach((c, idx) => {
    const card = document.createElement('div');
    card.className = 'criterion-card';
    card.innerHTML = `
      <div class="crit-top">
        <div class="crit-info">
          <div class="crit-number">Criterion ${idx + 1} / ${criteria.length}</div>
          <div class="crit-title">${c.title}</div>
          <div class="crit-hint">${c.hint}</div>
        </div>
        <div class="level-btns" id="btns-${c.id}">
          ${levels.map((l, i) => `
            <button class="level-btn" data-level="${levelKeys[i]}" data-crit="${c.id}" onclick="setLevel('${c.id}', '${levelKeys[i]}', this)">
              ${l}
            </button>`).join('')}
        </div>
      </div>
      <textarea class="crit-notes" id="notes-${c.id}" placeholder="Notes on ${c.title.toLowerCase()}…"></textarea>
    `;
    container.appendChild(card);
  });
}

function setLevel(critId, level, btn) {
  ratings[critId] = level;
  const btns = document.querySelectorAll(`[data-crit="${critId}"]`);
  btns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function generateFeedback() {
  const name = document.getElementById('student-name').value.trim() || 'Student';
  const wentWell = document.getElementById('went-well').value.trim();
  const couldImprove = document.getElementById('could-improve').value.trim();

  const panel = document.getElementById('feedback-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Build score chips
  const chipsHTML = criteria.map(c => {
    const r = ratings[c.id];
    const cls = r ? `chip-${r}` : 'chip-none';
    const label = r ? levels[levelKeys.indexOf(r)] : '—';
    return `<div class="fb-score-chip ${cls}">
      <div class="chip-crit">${c.title}</div>
      <div class="chip-level">${label}</div>
    </div>`;
  }).join('');

  // Build notes list with rephrase buttons
  const noteItems = criteria.map(c => {
    const note = document.getElementById(`notes-${c.id}`).value.trim();
    const level = ratings[c.id] ? levels[levelKeys.indexOf(ratings[c.id])] : '';
    if (!note) return '';
    return `<li id="fb-note-item-${c.id}">
      <span class="note-crit">${c.title}</span>
      <span class="note-content-wrap" style="flex:1">
        <span id="fb-note-text-${c.id}">${note}</span>
        <div class="rephrase-row">
          <button class="btn-rephrase" id="btn-rephrase-${c.id}" onclick="rephraseNote('${c.id}', '${c.title}', '${level}')">✨ Polish</button>
        </div>
        <div class="ai-suggestion" id="ai-sug-${c.id}">
          <div class="ai-badge">✦ AI suggestion</div>
          <div id="ai-sug-text-${c.id}"></div>
          <div class="ai-suggestion-actions">
            <button class="btn-accept" onclick="acceptRephrase('${c.id}')">✓ Use this</button>
            <button class="btn-discard" onclick="discardRephrase('${c.id}')">Discard</button>
          </div>
        </div>
      </span>
    </li>`;
  }).filter(Boolean).join('');

  panel.innerHTML = `
    <div class="fb-header">
      <h2>Feedback Summary — <span>${name}</span></h2>
      <div class="fb-student-name">${document.getElementById('today-date').textContent}</div>
    </div>

    <div class="fb-section">
      <div class="fb-section-title">Level per criterion</div>
      <div class="fb-scores">${chipsHTML}</div>
    </div>

    ${noteItems ? `
    <div class="fb-section">
      <div class="fb-section-title">Detailed Notes</div>
      <ul class="fb-notes-list">${noteItems}</ul>
    </div>` : ''}

    ${(wentWell || couldImprove) ? `
    <div class="fb-section">
      <div class="fb-section-title">Overall impression</div>
      <div class="fb-overall">
        ${wentWell ? `<div class="fb-overall-box went">
          <div class="fb-overall-label">✓ What went well</div>
          <p id="fb-went-text">${wentWell}</p>
          <div class="rephrase-row" style="margin-top:0.6rem">
            <button class="btn-rephrase" id="btn-rephrase-went" onclick="rephraseOverall('went', 'What went well')">✨ Polish</button>
          </div>
          <div class="ai-suggestion" id="ai-sug-went">
            <div class="ai-badge">✦ AI suggestion</div>
            <div id="ai-sug-text-went"></div>
            <div class="ai-suggestion-actions">
              <button class="btn-accept" onclick="acceptRephraseOverall('went')">✓ Use this</button>
              <button class="btn-discard" onclick="discardRephraseOverall('went')">Discard</button>
            </div>
          </div>
        </div>` : ''}
        ${couldImprove ? `<div class="fb-overall-box improve">
          <div class="fb-overall-label">△ What could be improved</div>
          <p id="fb-improve-text">${couldImprove}</p>
          <div class="rephrase-row" style="margin-top:0.6rem">
            <button class="btn-rephrase" id="btn-rephrase-improve" onclick="rephraseOverall('improve', 'What could be improved')">✨ Polish</button>
          </div>
          <div class="ai-suggestion" id="ai-sug-improve">
            <div class="ai-badge">✦ AI suggestion</div>
            <div id="ai-sug-text-improve"></div>
            <div class="ai-suggestion-actions">
              <button class="btn-accept" onclick="acceptRephraseOverall('improve')">✓ Use this</button>
              <button class="btn-discard" onclick="discardRephraseOverall('improve')">Discard</button>
            </div>
          </div>
        </div>` : ''}
      </div>
    </div>` : ''}

    <div class="fb-print-btn">
      <button class="btn-ghost" onclick="printFeedback()">🖨 Print / Save as PDF</button>
    </div>
  `;
}

async function callClaude(prompt) {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) throw new Error('Please enter your Anthropic API key in the field at the top.');

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "x-api-key": apiKey
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  return data.content[0].text.trim();
}

async function rephraseNote(critId, critTitle, level) {
  const rawNote = document.getElementById(`fb-note-text-${critId}`).textContent.trim();
  if (!rawNote) return;
  const btn = document.getElementById(`btn-rephrase-${critId}`);
  const sugBox = document.getElementById(`ai-sug-${critId}`);
  const sugText = document.getElementById(`ai-sug-text-${critId}`);

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '✦ Polishing…';

  try {
    const prompt = `You are writing concise, professional teacher feedback for a B1+ Business English oral assessment.
Criterion: ${critTitle}${level ? ` | Level given: ${level}` : ''}
Raw teacher note: "${rawNote}"

Rephrase this into one or two polished sentences suitable for an official student report. Use formal but encouraging language. Do not add new information — only rephrase what is there. Reply with the rephrased text only, no preamble.`;

    const result = await callClaude(prompt);
    sugText.textContent = result;
    sugBox.classList.add('visible');
  } catch (e) {
    sugText.textContent = `⚠ ${e.message || 'Could not connect. Open this file directly in your browser (not inside a preview).'}`;
    sugBox.classList.add('visible');
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.textContent = '✨ Polish';
}

function resetForm() {
  document.getElementById('student-name').value = '';
  document.getElementById('went-well').value = '';
  document.getElementById('could-improve').value = '';
  criteria.forEach(c => {
    ratings[c.id] = null;
    document.getElementById(`notes-${c.id}`).value = '';
    document.querySelectorAll(`[data-crit="${c.id}"]`).forEach(b => b.classList.remove('active'));
  });
  document.getElementById('feedback-panel').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
